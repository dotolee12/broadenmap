<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 대동여지도</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body { margin:0; height:100%; overflow:hidden; background:#0d0d18; }
#map { position:absolute; inset:0; }
#fog-canvas { position:absolute; inset:0; pointer-events:none; }

#rec {
  position:absolute; top:20px; left:20px;
  padding:10px 14px; border-radius:20px;
  background:rgba(255,255,255,0.1); color:#fff;
  cursor:pointer; z-index:1000;
}
</style>
</head>

<body>

<div id="map"></div>
<canvas id="fog-canvas"></canvas>
<div id="rec" onclick="toggleRecord()">기록중</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ================== 지도 ==================
const map = L.map('map').setView([37.5340,126.9950],17);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  maxZoom:19
}).addTo(map);

// ================== 안개 ==================
const fog = document.getElementById('fog-canvas');
const fctx = fog.getContext('2d');

function resizeFog(){
  const dpr = window.devicePixelRatio || 1;
  fog.width = window.innerWidth * dpr;
  fog.height = window.innerHeight * dpr;
  fctx.setTransform(dpr,0,0,dpr,0,0);
  redrawFog();
}

window.addEventListener('resize', resizeFog);

// 🔥 핵심: 원으로 안개 제거
function eraseFogCircle(latlng, radius=70, alpha=1){
  const p = map.latLngToContainerPoint(latlng);

  fctx.save();
  fctx.globalCompositeOperation = 'destination-out';
  fctx.globalAlpha = alpha;

  const g = fctx.createRadialGradient(
    p.x, p.y, 0,
    p.x, p.y, radius
  );

  g.addColorStop(0, 'rgba(0,0,0,1)');
  g.addColorStop(1, 'rgba(0,0,0,0)');

  fctx.fillStyle = g;
  fctx.beginPath();
  fctx.arc(p.x, p.y, radius, 0, Math.PI*2);
  fctx.fill();

  fctx.restore();
}

// 전체 다시 그림
function redrawFog(){
  const W = window.innerWidth;
  const H = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;

  fctx.clearRect(0,0,fog.width,fog.height);

  fctx.save();
  fctx.setTransform(dpr,0,0,dpr,0,0);

  // 전체 어둠
  fctx.fillStyle = 'rgba(8,10,22,0.92)';
  fctx.fillRect(0,0,W,H);

  // 🔥 지나간 길 밝히기
  todayLatlngs.forEach(ll=>{
    eraseFogCircle(ll, 80, 1);
  });

  memories.forEach(mem=>{
    mem.latlngs.forEach(ll=>{
      eraseFogCircle(ll, 60, 0.5);
    });
  });

  fctx.restore();
}

map.on('move zoom', redrawFog);

// ================== 상태 ==================
let recording = true;
let currentLatLng = null;
let todayLatlngs = [];
let memories = [];

// ================== 거리 계산 ==================
function dist(a,b){
  const R=6371000;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2 +
          Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*
          Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ================== 위치 처리 ==================
function handlePos(ll){

  if(!currentLatLng){
    map.setView(ll,17);
    todayLatlngs.push(ll);
    currentLatLng = ll;
    return;
  }

  const d = dist(currentLatLng, ll);

  if(recording && d > 1){
    todayLatlngs.push(ll);
    redrawFog();
  }

  currentLatLng = ll;
}

// ================== GPS ==================
function startGPS(){
  if(!navigator.geolocation){
    startSim(); return;
  }

  navigator.geolocation.watchPosition(pos=>{
    const ll = L.latLng(pos.coords.latitude,pos.coords.longitude);
    handlePos(ll);
  },
  ()=>startSim(),
  { enableHighAccuracy:true });
}

// ================== 시뮬 ==================
function startSim(){
  let lat=37.5340, lng=126.9950;

  setInterval(()=>{
    lat += (Math.random()-0.5)*0.0002;
    lng += (Math.random()-0.5)*0.0002;

    handlePos(L.latLng(lat,lng));
  },800);
}

// ================== 기록 ==================
function toggleRecord(){
  recording = !recording;
  document.getElementById('rec').textContent =
    recording ? "기록중" : "정지";

  if(!recording && todayLatlngs.length > 10){
    memories.push({
      latlngs:[...todayLatlngs]
    });
    todayLatlngs = [];
  }
}

// ================== 시작 ==================
resizeFog();
startGPS();

</script>

</body>
</html>
