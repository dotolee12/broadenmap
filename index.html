<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wayou — 나의 대동여지도</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --ui-bg: rgba(10,10,14,0.85);
            --ui-border: rgba(255,255,255,0.07);
            --ui-text: #e8e6e0;
            --ui-muted: rgba(232,230,224,0.4);
            --accent: #c8b89a;
        }
        body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #0a0a0e; overflow: hidden; color: var(--ui-text); }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* 안개 캔버스 — 지도 위에 고정 */
        #fog-canvas {
            position: fixed; inset: 0; z-index: 2;
            pointer-events: none;
        }

        .hamburger {
            position: fixed; top: 22px; left: 18px; z-index: 4000;
            cursor: pointer; padding: 9px 10px;
            background: var(--ui-bg); border: 1px solid var(--ui-border);
            border-radius: 10px; backdrop-filter: blur(16px);
        }
        .hamburger .line { width: 20px; height: 2px; background: var(--ui-text); margin: 4px 0; border-radius: 2px; }

        .status-pill {
            position: fixed; top: 22px; left: 68px; z-index: 4000;
            padding: 8px 14px; border-radius: 20px;
            background: var(--ui-bg); border: 1px solid var(--ui-border);
            backdrop-filter: blur(16px); font-size: 12px; color: var(--ui-muted);
            display: flex; align-items: center; gap: 7px;
            opacity: 0; transition: opacity 0.4s; pointer-events: none;
        }
        .status-pill.on { opacity: 1; }
        .s-dot { width: 6px; height: 6px; border-radius: 50%; background: white; animation: blink 1.6s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .menu-overlay {
            position: fixed; inset: 0; z-index: 5000;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .menu-overlay.open { opacity: 1; pointer-events: auto; }
        .menu-sheet {
            width: 100%; max-width: 480px;
            background: #111118; border: 1px solid var(--ui-border);
            border-bottom: none; border-radius: 20px 20px 0 0;
            padding: 0 0 44px;
            transform: translateY(100%);
            transition: transform 0.38s cubic-bezier(.25,.8,.25,1);
        }
        .menu-overlay.open .menu-sheet { transform: translateY(0); }
        .handle { width: 36px; height: 4px; background: rgba(255,255,255,0.13); border-radius: 2px; margin: 14px auto 22px; cursor: pointer; }
        .sheet-section { font-size: 10px; letter-spacing: 3px; color: var(--accent); padding: 0 24px; margin-bottom: 10px; }

        .mbtn {
            width: calc(100% - 48px); margin: 5px 24px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--ui-border);
            border-radius: 14px; padding: 15px 18px;
            display: flex; align-items: center; gap: 14px;
            cursor: pointer; transition: background 0.2s; color: var(--ui-text);
        }
        .mbtn:hover { background: rgba(255,255,255,0.07); }
        .mbtn.rec { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }
        .micon { width: 34px; height: 34px; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
        .mlabel { flex:1; }
        .mname { font-size: 14px; }
        .msub  { font-size: 11px; color: var(--ui-muted); margin-top: 2px; }
        .mbadge { font-size: 10px; padding: 3px 9px; border-radius: 10px; background: rgba(255,255,255,0.07); color: var(--ui-muted); }
        .mdivider { height: 1px; background: var(--ui-border); margin: 12px 24px; }

        .bottom-panel {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 3000;
            background: var(--ui-bg); border-top: 1px solid var(--ui-border);
            backdrop-filter: blur(20px);
            padding: 14px 0 30px;
            display: grid; grid-template-columns: 1fr 1fr 1fr;
        }
        .stat { text-align: center; }
        .stat + .stat { border-left: 1px solid var(--ui-border); }
        .sval { font-size: 24px; font-weight: 700; color: var(--ui-text); line-height: 1; }
        .sunit { font-size: 11px; color: var(--ui-muted); }
        .slabel { font-size: 10px; color: var(--ui-muted); margin-top: 4px; letter-spacing: 0.5px; }

        .history-panel {
            position: fixed; inset: 0; z-index: 6000;
            background: #0a0a0e; overflow-y: auto;
            transform: translateX(100%); transition: transform 0.38s cubic-bezier(.25,.8,.25,1);
        }
        .history-panel.open { transform: none; }
        .hheader { display:flex; align-items:center; gap:14px; padding: 56px 22px 18px; border-bottom: 1px solid var(--ui-border); }
        .hback { background:none; border:none; color: var(--ui-text); font-size:20px; cursor:pointer; padding:6px; }
        .htitle { font-size: 20px; font-weight: 600; }
        .hcard { margin: 10px 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--ui-border); border-radius: 14px; padding: 16px 18px; cursor:pointer; transition: background 0.2s; }
        .hcard:hover { background: rgba(255,255,255,0.06); }
        .hcard-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
        .hcard-dot { width:9px; height:9px; border-radius:50%; }
        .hcard-name { font-size:14px; font-weight:500; }
        .hcard-date { font-size:11px; color:var(--ui-muted); margin-left:auto; }
        .hcard-stats { display:flex; gap:14px; }
        .hcard-stat { font-size:12px; color:var(--ui-muted); }
        .hcard-stat b { color:var(--ui-text); font-weight:500; }
        .hempty { text-align:center; padding:80px 40px; color:var(--ui-muted); font-size:14px; line-height:2; }
    </style>
</head>
<body>

<div class="hamburger" onclick="toggleMenu()">
    <div class="line"></div><div class="line"></div><div class="line"></div>
</div>
<div class="status-pill" id="sPill">
    <div class="s-dot" id="sDot"></div>
    <span id="sText">기록 중</span>
</div>

<canvas id="fog-canvas"></canvas>

<div class="menu-overlay" id="menuOverlay" onclick="if(event.target===this)toggleMenu()">
    <div class="menu-sheet">
        <div class="handle" onclick="toggleMenu()"></div>
        <div class="sheet-section">나의 대동여지도</div>

        <button class="mbtn" onclick="centerMap()">
            <div class="micon" style="background:rgba(251,191,36,.12);color:#fbbf24">⊙</div>
            <div class="mlabel"><div class="mname">현 위치로</div><div class="msub">지도를 내 위치로 이동</div></div>
        </button>

        <div class="mdivider"></div>
        <div class="sheet-section" style="margin-bottom:8px">기억 기록</div>

        <button class="mbtn" id="btn-blue" onclick="toggleMemory('blue')">
            <div class="micon" style="background:rgba(96,165,250,.12);color:#60a5fa">●</div>
            <div class="mlabel"><div class="mname">기억 1</div><div class="msub" id="sub-blue">일상의 경로</div></div>
            <span class="mbadge" id="badge-blue">시작</span>
        </button>
        <button class="mbtn" id="btn-green" onclick="toggleMemory('green')">
            <div class="micon" style="background:rgba(74,222,128,.12);color:#4ade80">●</div>
            <div class="mlabel"><div class="mname">기억 2</div><div class="msub" id="sub-green">새로운 발견</div></div>
            <span class="mbadge" id="badge-green">시작</span>
        </button>
        <button class="mbtn" id="btn-fuchsia" onclick="toggleMemory('fuchsia')">
            <div class="micon" style="background:rgba(232,121,249,.12);color:#e879f9">●</div>
            <div class="mlabel"><div class="mname">기억 3</div><div class="msub" id="sub-fuchsia">특별한 순간</div></div>
            <span class="mbadge" id="badge-fuchsia">시작</span>
        </button>

        <div class="mdivider"></div>
        <button class="mbtn" onclick="openHistory()">
            <div class="micon" style="background:rgba(255,255,255,.05);color:var(--ui-muted)">☰</div>
            <div class="mlabel"><div class="mname">오래된 기억들</div><div class="msub" id="hlabel">저장된 경로 없음</div></div>
        </button>
    </div>
</div>

<div class="bottom-panel">
    <div class="stat"><div class="sval" id="sv-total">0<span class="sunit">km</span></div><div class="slabel">오늘 걸은 거리</div></div>
    <div class="stat"><div class="sval" id="sv-new">0<span class="sunit">km</span></div><div class="slabel">새로운 길</div></div>
    <div class="stat"><div class="sval" id="sv-pts">0</div><div class="slabel">기록 포인트</div></div>
</div>

<div class="history-panel" id="historyPanel">
    <div class="hheader">
        <button class="hback" onclick="closeHistory()">←</button>
        <span class="htitle">오래된 기억들</span>
    </div>
    <div id="historyList"></div>
</div>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ══════════════════════════════════════════════════════
//  FOG OF WAR 렌더링 원리
//  ┌──────────────────────────────────────┐
//  │  Leaflet 지도 (z:1) — 기본 다크 타일  │
//  │  + fog-canvas (z:2)                  │
//  │    → 검정으로 전체 덮기              │
//  │    → 걸은 경로 주변: destination-out │
//  │      (구멍을 뚫어 지도가 보이게)     │
//  │    → 구멍의 투명도 = 시간에 따라     │
//  │      서서히 채워짐 (기억이 흐려짐)   │
//  └──────────────────────────────────────┘
// ══════════════════════════════════════════════════════

const FADE_DURATION_MS = 8 * 60 * 1000;  // 8분에 걸쳐 완전히 어두워짐
const REVEAL_R  = 38;   // 발걸음 reveal 반경 (px)
const GLOW_R    = 70;   // 현재 위치 발광 반경 (px)
const MIN_ALPHA = 0.10; // 완전히 바랜 후 최소 흔적

const MEM = {
    blue:    { color: '#60a5fa', name: '기억 1', trail: [] },
    green:   { color: '#4ade80', name: '기억 2', trail: [] },
    fuchsia: { color: '#e879f9', name: '기억 3', trail: [] },
};

let map, canvas, ctx;
let allTrail    = [];   // { ll: L.LatLng, t: number, color: string }
let currentMem  = null;
let curMarker   = null;
let lastLL      = null;
let totalKm     = 0;
let saved       = JSON.parse(localStorage.getItem('wayou_mem2') || '[]');

// ─── 초기화 ───
function init() {
    map = L.map('map', { zoomControl: false, attributionControl: false })
           .setView([37.5665, 126.9780], 16);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 })
     .addTo(map);

    canvas = document.getElementById('fog-canvas');
    ctx    = canvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    map.on('move zoom resize', () => {});  // redraw는 rAF에서 처리

    startGPS();
    updateHLabel();
    requestAnimationFrame(renderLoop);
}

function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
}

// ─── 렌더 루프 ───
function renderLoop() {
    drawFog();
    requestAnimationFrame(renderLoop);
}

function drawFog() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // 1. 완전 불투명 검정 안개
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(10,10,14,0.97)';
    ctx.fillRect(0, 0, W, H);

    // 2. 저장된 기억 (희미하게)
    saved.forEach(mem => {
        if (!mem.trail) return;
        mem.trail.forEach(pt => {
            punchHole(pt.x, pt.y, REVEAL_R * 0.55, MIN_ALPHA + 0.08, mem.color);
        });
    });

    // 3. 현재 세션 트레일 (시간 기반 페이드)
    const now = Date.now();
    allTrail.forEach(pt => {
        const px  = map.latLngToContainerPoint(pt.ll);
        const age = now - pt.t;
        const ratio = Math.min(age / FADE_DURATION_MS, 1);
        // ratio 0 → alpha 1.0 (선명), ratio 1 → alpha MIN_ALPHA (희미)
        const alpha = 1.0 - ratio * (1.0 - MIN_ALPHA);
        punchHole(px.x, px.y, REVEAL_R, alpha, pt.color);
    });

    // 4. 현재 위치 발광
    if (curMarker) {
        const px = map.latLngToContainerPoint(curMarker.getLatLng());
        ctx.globalCompositeOperation = 'destination-out';
        const grad = ctx.createRadialGradient(px.x, px.y, 0, px.x, px.y, GLOW_R);
        grad.addColorStop(0,   'rgba(0,0,0,0.95)');
        grad.addColorStop(0.3, 'rgba(0,0,0,0.7)');
        grad.addColorStop(0.7, 'rgba(0,0,0,0.2)');
        grad.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(px.x, px.y, GLOW_R, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
    }
}

// 안개에 구멍 뚫기 (destination-out) + 색조 글로우
function punchHole(x, y, r, alpha, hexColor) {
    // 구멍
    ctx.globalCompositeOperation = 'destination-out';
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0,   `rgba(0,0,0,${alpha})`);
    g.addColorStop(0.45,`rgba(0,0,0,${alpha * 0.65})`);
    g.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    // 색조 글로우 오버레이 (기억 색상)
    ctx.globalCompositeOperation = 'source-over';
    const rgb = hexToRgb(hexColor);
    const gg = ctx.createRadialGradient(x, y, 0, x, y, r * 0.55);
    gg.addColorStop(0,  `rgba(${rgb},${alpha * 0.09})`);
    gg.addColorStop(1,  `rgba(${rgb},0)`);
    ctx.fillStyle = gg;
    ctx.beginPath();
    ctx.arc(x, y, r * 0.55, 0, Math.PI * 2);
    ctx.fill();
}

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
}

// ─── GPS ───
function startGPS() {
    if (!navigator.geolocation) { demoWalk(); return; }
    navigator.geolocation.watchPosition(onPos, () => demoWalk(),
        { enableHighAccuracy: true, maximumAge: 3000, timeout: 8000 });
}

function onPos(pos) {
    const ll  = L.latLng(pos.coords.latitude, pos.coords.longitude);
    const now = Date.now();

    setMarker(ll);

    if (!lastLL) {
        map.flyTo(ll, 17, { duration: 1.5 });
    } else {
        const d = ll.distanceTo(lastLL) / 1000;
        if (d < 0.003) return;
        totalKm += d;
    }

    lastLL = ll;
    const color = currentMem ? MEM[currentMem].color : '#e8e6e0';
    allTrail.push({ ll, t: now, color });

    if (currentMem) MEM[currentMem].trail.push({ ll, t: now });

    updateStats();
}

function setMarker(ll) {
    if (!curMarker) {
        const icon = L.divIcon({
            className: '',
            html: `<div style="width:13px;height:13px;background:white;border-radius:50%;
                   box-shadow:0 0 0 3px rgba(255,255,255,.18),0 0 10px rgba(255,255,255,.35);
                   border:1.5px solid rgba(0,0,0,.12)"></div>`,
            iconSize: [13,13], iconAnchor: [6.5,6.5]
        });
        curMarker = L.marker(ll, { icon }).addTo(map);
    } else {
        curMarker.setLatLng(ll);
    }
}

// 데모 (GPS 없을 때)
function demoWalk() {
    const route = [
        [37.5665,126.9780],[37.5669,126.9787],[37.5675,126.9795],
        [37.5682,126.9803],[37.5689,126.9810],[37.5696,126.9816],
        [37.5703,126.9821],[37.5710,126.9816],[37.5716,126.9808],
        [37.5722,126.9800],[37.5727,126.9792],[37.5732,126.9784],
        [37.5728,126.9775],[37.5722,126.9768],[37.5715,126.9762],
        [37.5708,126.9758],[37.5701,126.9754],[37.5694,126.9760],
        [37.5688,126.9767],[37.5682,126.9774],
    ];
    map.setView(route[0], 16);
    let i = 0;
    const go = () => {
        if (i >= route.length) return;
        onPos({ coords: { latitude: route[i][0], longitude: route[i][1], accuracy: 8 } });
        i++;
        setTimeout(go, 1600);
    };
    go();
}

// ─── 기억 토글 ───
function toggleMemory(key) {
    const mem = MEM[key];
    const isActive = currentMem === key;

    if (isActive) {
        // 저장
        const trail = mem.trail;
        if (trail.length >= 2) {
            // 픽셀 좌표도 함께 저장 (저장 시점 기준)
            const snapTrail = trail.map(pt => {
                const px = map.latLngToContainerPoint(pt.ll);
                return { x: px.x, y: px.y, latlng: { lat: pt.ll.lat, lng: pt.ll.lng } };
            });
            saved.unshift({
                id: Date.now(), key,
                name: mem.name, color: mem.color,
                trail: snapTrail,
                distanceKm: calcDist(trail),
                date: new Date().toLocaleDateString('ko-KR', { month:'long', day:'numeric', weekday:'short' }),
                time: new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' }),
            });
            localStorage.setItem('wayou_mem2', JSON.stringify(saved));
        }
        mem.trail = [];
        currentMem = null;

        document.getElementById(`btn-${key}`).classList.remove('rec');
        document.getElementById(`badge-${key}`).textContent = '시작';
        document.getElementById(`badge-${key}`).style.color = '';
        document.getElementById(`sub-${key}`).textContent = '저장됨';
        updateHLabel();
    } else {
        if (currentMem) toggleMemory(currentMem);
        currentMem = key;
        document.getElementById(`btn-${key}`).classList.add('rec');
        document.getElementById(`badge-${key}`).textContent = '중지';
        document.getElementById(`badge-${key}`).style.color = mem.color;
        document.getElementById(`sub-${key}`).textContent = '기록 중…';
    }

    const pill = document.getElementById('sPill');
    const dot  = document.getElementById('sDot');
    const st   = document.getElementById('sText');
    if (currentMem) {
        pill.classList.add('on');
        dot.style.background = MEM[currentMem].color;
        st.textContent = MEM[currentMem].name + ' 기록 중';
    } else {
        pill.classList.remove('on');
    }
    toggleMenu();
}

// ─── 통계 ───
function updateStats() {
    const memDist = currentMem ? calcDist(MEM[currentMem].trail) : 0;
    document.getElementById('sv-total').innerHTML = totalKm.toFixed(2) + '<span class="sunit">km</span>';
    document.getElementById('sv-new').innerHTML   = memDist.toFixed(2) + '<span class="sunit">km</span>';
    document.getElementById('sv-pts').textContent = allTrail.length;
}

function calcDist(trail) {
    let d = 0;
    for (let i = 1; i < trail.length; i++) d += trail[i].ll.distanceTo(trail[i-1].ll) / 1000;
    return d;
}

// ─── 히스토리 ───
function openHistory()  { toggleMenu(); setTimeout(() => { document.getElementById('historyPanel').classList.add('open'); renderHistory(); }, 50); }
function closeHistory() { document.getElementById('historyPanel').classList.remove('open'); }
function updateHLabel() {
    document.getElementById('hlabel').textContent = saved.length ? `${saved.length}개의 기억` : '저장된 경로 없음';
}
function renderHistory() {
    const el = document.getElementById('historyList');
    if (!saved.length) {
        el.innerHTML = '<div class="hempty">🗺<br><br>아직 저장된 기억이 없어요.</div>';
        return;
    }
    el.innerHTML = saved.map((m,i) => `
        <div class="hcard" onclick="flyToMem(${i})">
            <div class="hcard-row">
                <div class="hcard-dot" style="background:${m.color}"></div>
                <span class="hcard-name">${m.name}</span>
                <span class="hcard-date">${m.date} ${m.time}</span>
            </div>
            <div class="hcard-stats">
                <div class="hcard-stat"><b>${m.distanceKm.toFixed(2)}km</b></div>
                <div class="hcard-stat"><b>${m.trail.length}</b> 포인트</div>
            </div>
        </div>`).join('');
}
function flyToMem(i) {
    const m = saved[i];
    if (!m.trail.length) return;
    closeHistory();
    const latlngs = m.trail.map(p => [p.latlng.lat, p.latlng.lng]);
    const bounds = L.latLngBounds(latlngs);
    setTimeout(() => map.flyToBounds(bounds, { padding:[80,80], duration:1.5 }), 300);
}

// ─── 유틸 ───
function toggleMenu()  { document.getElementById('menuOverlay').classList.toggle('open'); }
function centerMap()   {
    if (lastLL) map.flyTo(lastLL, 17, { duration: 1.2 });
    else navigator.geolocation?.getCurrentPosition(p => map.flyTo([p.coords.latitude, p.coords.longitude], 17));
    toggleMenu();
}

window.onload = init;
</script>
